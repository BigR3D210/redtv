name: Build Red TV APK

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the project
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK (auto-locate project root)
        run: |
          DIR="$(dirname "$(find . -name settings.gradle.kts | head -1)")"
          echo "Project root detected at: $DIR"
          cd "$DIR"
          gradle assembleDebug --no-daemon --stacktrace -PbuildNumber=${{ github.run_number }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RedTV-debug-apk
          path: '**/app/build/outputs/apk/debug/app-debug.apk'
          if-no-files-found: error

      - name: Publish Release (for in-app updates)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: b${{ github.run_number }}
          name: Build ${{ github.run_number }}
          files: '**/app/build/outputs/apk/debug/app-debug.apk'
          fail_on_unmatched_files: false
